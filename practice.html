<!DOCTYPE html>
<html lang="en">


    <head>
        <title>HTML5 Audio Player</title>
        <style>
            #playlist{
                list-style: none;
            }
            #playlist li a{
                color: chocolate;
                text-decoration: none;
            }
            #playlist .current-song a{
                color: blue;
            }
        </style>
    </head>
       
    <body>
        <audio src="" controls id="videoplayer">
            Sorry, your browser doesn't support html5!
            

        </audio>
        <ul id="playlist">
            <li class="current-song"><a href="Artonad.mp3"> Artonad by sohojia</a></li>
            <li><a href="bohut peyar.mp3"> bohut peyar karte hain </a></li>
            <li><a href="chand se farish.mp3">chand se farish  </a></li>
            <li><a href="channa mereya.mp3">channa mereya by arjit shing</a></li>
            

        </ul>
        <script src="https://code.jquery.com/jquery-2.2.0.js">

        </script>
        <script>
            audioPlayer();
            function audioPlayer(){
                $ ("#audioPlayer")[0].src = ("#playlist li a")
                [0];
                $ ("#audioPlayer")[0].play();
            }
        </script>

    </body>
</html>
